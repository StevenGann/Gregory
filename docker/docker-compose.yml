# Gregory - Smart House AI
# Deploy to home server or Raspberry Pi via Docker

services:
  gregory:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - NOTES_PATH=/app/notes
      - FAMILY_MEMBERS=${FAMILY_MEMBERS:-}
      - MEMORY_ENABLED=${MEMORY_ENABLED:-false}
      - MEMORY_PATH=/app/memory
      - MEMORY_SIMILARITY_THRESHOLD=${MEMORY_SIMILARITY_THRESHOLD:-0.7}
      - MEMORY_TOP_K=${MEMORY_TOP_K:-3}
      - MEMORY_EMBEDDING_PROVIDER=${MEMORY_EMBEDDING_PROVIDER:-default}
      - MEMORY_EMBEDDING_MODEL=${MEMORY_EMBEDDING_MODEL:-nomic-embed-text}
      - HEARTBEAT_DAILY_SUMMARY_MINUTES=${HEARTBEAT_DAILY_SUMMARY_MINUTES:-0}
      - HEARTBEAT_MEMORY_COMPRESSION_MINUTES=${HEARTBEAT_MEMORY_COMPRESSION_MINUTES:-0}
    volumes:
      - notes:/app/notes
      - memory:/app/memory
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  notes:
  memory:
