<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gregory Log Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      margin: 0;
      padding: 1rem;
      background: #1a1a1a;
      color: #e4e4e7;
      font-size: 13px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem 0; font-weight: 600; }
    .nav { margin-bottom: 1rem; }
    .nav a {
      color: #7dd3fc;
      text-decoration: none;
      margin-right: 1rem;
      font-size: 0.9rem;
    }
    .nav a:hover { text-decoration: underline; }
    .config {
      background: #27272a;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #3f3f46;
    }
    .config label { display: block; margin-bottom: 0.25rem; font-weight: 500; color: #a1a1aa; }
    .config input[type="text"] {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-family: inherit;
    }
    .config input::placeholder { color: #71717a; }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .level-filters {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .level-filters label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      user-select: none;
    }
    .level-filters input { margin: 0; cursor: pointer; }
    .level-filters .DEBUG { color: #94a3b8; }
    .level-filters .INFO { color: #22c55e; }
    .level-filters .WARNING { color: #eab308; }
    .level-filters .ERROR { color: #ef4444; }
    .substring-filter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .substring-filter input {
      width: 200px;
      padding: 0.4rem 0.6rem;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-family: inherit;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .controls button {
      padding: 0.4rem 0.8rem;
      background: #3f3f46;
      color: #e4e4e7;
      border: 1px solid #52525b;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .controls button:hover { background: #52525b; }
    .controls button.primary { background: #3b82f6; border-color: #3b82f6; color: white; }
    .controls button.primary:hover { background: #2563eb; }
    .controls .status {
      font-size: 0.8rem;
      color: #71717a;
      margin-left: auto;
    }
    .controls .status.connected { color: #22c55e; }
    .controls .status.error { color: #ef4444; }
    .log-container {
      border: 1px solid #3f3f46;
      border-radius: 6px;
      background: #18181b;
      overflow: hidden;
      min-height: 300px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }
    .log-output {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      font-size: 12px;
      line-height: 1.5;
    }
    .log-line {
      padding: 0.15rem 0;
      border-bottom: 1px solid #27272a;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .log-line:last-child { border-bottom: none; }
    .log-line.DEBUG { color: #94a3b8; }
    .log-line.INFO { color: #22c55e; }
    .log-line.WARNING { color: #eab308; }
    .log-line.ERROR { color: #ef4444; }
    .log-line .ts { color: #71717a; margin-right: 0.5rem; }
    .log-line .level { font-weight: 600; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <h1>Gregory Log Viewer</h1>
  <nav class="nav">
    <a href="chat.html">Chat Debug</a>
    <a href="logging.html">Log Viewer</a>
    <a href="config.html">Config</a>
  </nav>

  <div class="config">
    <label for="baseUrl">API base URL</label>
    <input type="text" id="baseUrl" value="http://localhost:8000" placeholder="http://localhost:8000">
  </div>

  <div class="filters">
    <div class="level-filters">
      <span style="color:#a1a1aa;font-size:0.85rem;">Levels:</span>
      <label><input type="checkbox" id="cbDEBUG" checked> <span class="DEBUG">DEBUG</span></label>
      <label><input type="checkbox" id="cbINFO" checked> <span class="INFO">INFO</span></label>
      <label><input type="checkbox" id="cbWARNING" checked> <span class="WARNING">WARNING</span></label>
      <label><input type="checkbox" id="cbERROR" checked> <span class="ERROR">ERROR</span></label>
    </div>
    <div class="substring-filter">
      <label for="substring" style="margin:0;color:#a1a1aa;font-size:0.85rem;">Filter:</label>
      <input type="text" id="substring" placeholder="Messages containing...">
    </div>
  </div>

  <div class="controls">
    <button id="refresh" class="primary">Refresh</button>
    <label><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
    <span class="status" id="status"></span>
  </div>

  <div class="log-container">
    <div class="log-output" id="logOutput"></div>
  </div>

  <script>
    const baseUrlEl = document.getElementById('baseUrl');
    const logOutput = document.getElementById('logOutput');
    const refreshBtn = document.getElementById('refresh');
    const autoScrollEl = document.getElementById('autoScroll');
    const statusEl = document.getElementById('status');
    const levelCheckboxes = { DEBUG: document.getElementById('cbDEBUG'), INFO: document.getElementById('cbINFO'), WARNING: document.getElementById('cbWARNING'), ERROR: document.getElementById('cbERROR') };
    const substringEl = document.getElementById('substring');

    let logs = [];
    let eventSource = null;

    function baseUrl() {
      return baseUrlEl.value.replace(/\/$/, '');
    }

    function levelEnabled(level) {
      return levelCheckboxes[level]?.checked ?? true;
    }

    function substringFilter() {
      return (substringEl.value || '').trim().toLowerCase();
    }

    function matchesFilters(entry) {
      if (!levelEnabled(entry.level)) return false;
      const sub = substringFilter();
      if (!sub) return true;
      const msg = (entry.message || '').toLowerCase();
      const logger = (entry.logger || '').toLowerCase();
      return msg.includes(sub) || logger.includes(sub);
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function render() {
      const filtered = logs.filter(matchesFilters);
      logOutput.innerHTML = filtered.map(e => {
        return '<div class="log-line ' + escapeHtml(e.level) + '">' +
          '<span class="ts">' + escapeHtml(e.ts) + '</span>' +
          '<span class="level">[' + escapeHtml(e.level) + ']</span>' +
          '<span class="msg">' + escapeHtml(e.message) + '</span></div>';
      }).join('');
      if (autoScrollEl.checked) {
        logOutput.scrollTop = logOutput.scrollHeight;
      }
    }

    function setStatus(text, klass) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (klass ? ' ' + klass : '');
    }

    async function fetchLogs() {
      setStatus('Loading…', '');
      const levels = ['DEBUG','INFO','WARNING','ERROR'].filter(l => levelCheckboxes[l].checked);
      const params = new URLSearchParams();
      if (levels.length < 4) params.set('levels', levels.join(','));
      const sub = substringFilter();
      if (sub) params.set('substring', sub);
      params.set('limit', '1000');
      const url = baseUrl() + '/debug/logs?' + params;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(res.statusText);
        logs = await res.json();
        render();
        setStatus('Loaded ' + logs.length + ' entries', '');
      } catch (e) {
        setStatus('Error: ' + e.message, 'error');
      }
    }

    function connectStream() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      const url = baseUrl() + '/debug/logs/stream';
      eventSource = new EventSource(url);
      eventSource.onopen = () => setStatus('Live', 'connected');
      eventSource.onerror = () => {
        setStatus('Stream disconnected', 'error');
        eventSource.close();
        eventSource = null;
      };
      eventSource.onmessage = (ev) => {
        try {
          const entry = JSON.parse(ev.data);
          logs.push(entry);
          if (logs.length > 2000) logs = logs.slice(-1500);
          render();
        } catch (_) {}
      };
    }

    refreshBtn.addEventListener('click', () => {
      fetchLogs();
      connectStream();
    });

    ['DEBUG','INFO','WARNING','ERROR'].forEach(l => {
      levelCheckboxes[l].addEventListener('change', render);
    });
    substringEl.addEventListener('input', render);
    substringEl.addEventListener('keyup', (e) => { if (e.key === 'Enter') fetchLogs(); });

    fetchLogs();
    connectStream();
  </script>
</body>
</html>
